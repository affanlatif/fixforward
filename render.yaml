services:
  - type: web
    name: fixforward-api
    env: python
    plan: free
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        placeholder: "Your Neon or Supabase PostgreSQL connection string (postgresql://...)"
      - key: JWT_SECRET
        generateValue: true
